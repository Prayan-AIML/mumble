name: Build Mumble

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller "pywebview[mac]" pyobjc-framework-Cocoa
      - name: Build
        run: |
          pyinstaller \
            --onedir \
            --windowed \
            --name "Mumble" \
            --icon "MumbleIcon.icns" \
            --collect-all webview \
            --add-data "MumbleIcon.icns:." \
            mumble_app_release.py
      - name: Package as DMG
        run: |
          hdiutil create -volname Mumble -srcfolder dist/Mumble.app -ov -format UDZO Mumble-macOS.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: Mumble-macOS
          path: Mumble-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller pywebview
      - name: Build
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "Mumble" `
            --collect-all webview `
            mumble_app_release.py
      - uses: actions/upload-artifact@v4
        with:
          name: Mumble-Windows
          path: dist/Mumble.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
            libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Python dependencies
        run: pip install pyinstaller "pywebview[gtk]"
      - name: Build
        run: |
          pyinstaller \
            --onefile \
            --name "Mumble" \
            --collect-all webview \
            mumble_app_release.py
      - uses: actions/upload-artifact@v4
        with:
          name: Mumble-Linux
          path: dist/Mumble

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Mumble-macOS/Mumble-macOS.dmg
            Mumble-Windows/Mumble.exe
            Mumble-Linux/Mumble
          body: |
            ## Install Mumble

            | Platform | Download |
            |----------|----------|
            | macOS | `Mumble-macOS.dmg` |
            | Windows | `Mumble.exe` |
            | Linux | `Mumble` |

            Just download the file for your OS and open it.
